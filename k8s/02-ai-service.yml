apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: bi-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: ghcr.io/YOUR_GITHUB_USER/bi-agent-ai-service:latest
          ports:
            - containerPort: 8000
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bi-secrets
                  key: OPENAI_API_KEY
            - name: DATABASE_URL
              value: postgresql://postgres:postgres@postgres:5432/bi_analytics
            - name: REDIS_URL
              value: redis://redis:6379
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bi-secrets
                  key: SMTP_PASSWORD
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: bi-secrets
                  key: SLACK_WEBHOOK_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 1000m
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: bi-platform
spec:
  selector:
    app: ai-service
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-service-hpa
  namespace: bi-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-service
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
